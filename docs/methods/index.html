          ["file / video / image / voice / music / gif", "str | Path | bytes", "فایل / فایل ورودی"],
          ["name_file", "str | None", "فایل / نام فایل (پیشفرض: 'file')"],
          ["upload_by", "'aiohttp' | 'httpx' = 'aiohttp'", "فایل / کتابخانه آپلود"],
          ["file_id", "str | None", "فایل / آیدی فایل"],
          ["show_progress", "bool = True", "فایل / نمایش نوار پیشرفت"],
          ["chunk_size", "int = 64 * 1024", "فایل / سایز چانک"],

          ["question", "str", "نظرسنجی / متن سوال"],
          ["options", "list", "نظرسنجی / گزینه‌ها"],
          ["type_poll", "'Regular' | 'Quiz' = 'Regular'", "نظرسنجی / نوع نظرسنجی"],
          ["is_anonymous", "bool = True", "نظرسنجی / ناشناس بودن"],
          ["correct_option_index", "int | None", "نظرسنجی / ایندکس گزینه صحیح (Quiz)"],
          ["allows_multiple_answers", "bool = False", "نظرسنجی / چند انتخابی"],
          ["hint", "str | None", "نظرسنجی / راهنمایی پاسخ"],

          ["latitude", "str", "موقعیت مکانی / عرض جغرافیایی"],
          ["longitude", "str", "موقعیت مکانی / طول جغرافیایی"],

          ["first_name", "str", "مخاطب / نام"],
          ["last_name", "str", "مخاطب / نام خانوادگی"],
          ["phone_number", "str", "مخاطب / شماره تلفن"],
        ],
        returns: [
          ["msg_update", "<a href='../models/index.html#msg_update'>msg_update</a>", "اطلاعات پیام ارسال‌شده"],
        ],
        example: `await bot.send_message("chat_id", "text", file_id="file id")`
      },
      {
        id: "helpers",
        title: "متود های کمکی",
        signature: "cloes();stop()",
        desc: "فانکشن stop برای توقف گرفتن آپدیت ها توسط ربات و  فانکشن cloes برای آزاد سازی کامل منابع و متوقف کردن کامل ربات.",
        params: null,
        returns: null,
        example: `bot.stop()\nbot.cloes()`
      },
    ];

    function renderDocs() {
      const container = document.getElementById('methods-container');
      const tocList = document.getElementById('toc-list');
      container.innerHTML = '';
      tocList.innerHTML = '';

      methodsData.forEach((method, index) => {

        const section = document.createElement('section');
        section.className = 'method';
        section.id = method.id;

        const title = document.createElement('h2');
        title.textContent = method.title;
        section.appendChild(title);

        if (method.signature) {
          const sig = document.createElement('div');
          sig.className = 'signature';
          sig.textContent = method.signature;
          section.appendChild(sig);
        }

        if (method.desc) {
          const desc = document.createElement('div');
          desc.className = 'desc';
          desc.textContent = method.desc;
          section.appendChild(desc);
        }

        if (method.params && method.params.length > 0) {
          const tableTitle = document.createElement('p');
          tableTitle.style.fontWeight = 'bold';
          tableTitle.style.margin = '1.5rem 0 0.5rem';
          tableTitle.textContent = '📥 ورودی‌ها';
          section.appendChild(tableTitle);

          const div = document.createElement('div');
          div.className = 'table-responsive';
          const table = document.createElement('table');
          const thead = `<thead><tr><th>فیلد</th><th>نوع</th><th>توضیحات</th></tr></thead>`;
          let tbody = '<tbody>';
          method.params.forEach(p => {
            tbody += `<tr><td><code>${p[0]}</code></td><td>${p[1]}</td><td>${p[2]}</td></tr>`;
          });
          tbody += '</tbody>';
          table.innerHTML = thead + tbody;
          div.appendChild(table);
          section.appendChild(div);
        }

        if (method.returns && method.returns.length > 0) {
          const tableTitle = document.createElement('p');
          tableTitle.style.fontWeight = 'bold';
          tableTitle.style.margin = '1.5rem 0 0.5rem';
          tableTitle.textContent = '📤 خروجی';
          section.appendChild(tableTitle);

          const div = document.createElement('div');
          div.className = 'table-responsive';
          const table = document.createElement('table');
          const thead = `<thead><tr><th>فیلد</th><th>نوع</th><th>توضیحات</th></tr></thead>`;
          let tbody = '<tbody>';
          method.returns.forEach(r => {
            tbody += `<tr><td><code>${r[0]}</code></td><td>${r[1]}</td><td>${r[2]}</td></tr>`;
          });
          tbody += '</tbody>';
          table.innerHTML = thead + tbody;
          div.appendChild(table);
          section.appendChild(div);
        }

        if (method.example) {
          const exTitle = document.createElement('p');
          exTitle.style.fontWeight = 'bold';
          exTitle.style.margin = '1.8rem 0 0.5rem';
          exTitle.textContent = '🧪 مثال';
          section.appendChild(exTitle);

          const wrapper = document.createElement('div');
          wrapper.className = 'code-block-wrapper';
          const btn = document.createElement('button');
          btn.className = 'copy-btn';
          btn.textContent = 'کپی';
          wrapper.appendChild(btn);

          const pre = document.createElement('pre');
          const code = document.createElement('code');
          code.className = 'language-python';
          code.textContent = method.example.trim();
          pre.appendChild(code);
          wrapper.appendChild(pre);
          section.appendChild(wrapper);
        }

        container.appendChild(section);

        const tocItem = document.createElement('li');
        const tocLink = document.createElement('a');
        tocLink.href = `#${method.id}`;
        tocLink.textContent = method.title;
        tocItem.appendChild(tocLink);
        tocList.appendChild(tocItem);
      });

      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          const pre = this.nextElementSibling;
          const code = pre.querySelector('code');
          navigator.clipboard.writeText(code.textContent).then(() => {
            this.textContent = '✅ کپی شد!';
            setTimeout(() => { this.textContent = 'کپی'; }, 1200);
          });
        });
      });

      if (window.Prism) {
        Prism.highlightAll();
      }
    }

    window.addEventListener('DOMContentLoaded', renderDocs);
  </script>

</body>

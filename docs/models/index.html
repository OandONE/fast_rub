    function renderModels() {
      const container = document.getElementById('models-container');
      const tocList = document.getElementById('toc-list');
      container.innerHTML = '';
      tocList.innerHTML = '';

      modelsData.forEach((section, idx) => {
        const sectionEl = document.createElement('section');
        sectionEl.className = 'model-section';
        sectionEl.id = section.id;

        const title = document.createElement('h2');
        title.textContent = section.title;
        sectionEl.appendChild(title);

        if (section.description) {
          const desc = document.createElement('div');
          desc.className = 'desc';
          desc.textContent = section.description;
          sectionEl.appendChild(desc);
        }

        if (section.class_signature) {
          const sig = document.createElement('div');
          sig.className = 'class-signature';
          sig.textContent = section.class_signature;
          sectionEl.appendChild(sig);
        }

        if (section.init_params && section.init_params.length > 0) {
          const paramsTitle = document.createElement('h3');
          paramsTitle.textContent = '📥 ورودی‌های';
          sectionEl.appendChild(paramsTitle);

          const div = document.createElement('div');
          div.className = 'table-responsive';
          let table = `<table><thead><tr><th>فیلد</th><th>نوع</th><th>توضیحات</th></tr></thead><tbody>`;
          section.init_params.forEach(p => {
            table += `<tr><td><code>${p[0]}</code></td><td>${p[1]}</td><td>${p[2]}</td></tr>`;
          });
          table += `</tbody></table>`;
          div.innerHTML = table;
          sectionEl.appendChild(div);
        }

        if (section.properties && section.properties.length > 0) {
          const propTitle = document.createElement('h3');
          propTitle.textContent = '📋 پراپرتی‌ها';
          sectionEl.appendChild(propTitle);

          const div = document.createElement('div');
          div.className = 'table-responsive';
          let table = '<table><thead><tr><th>پراپرتی</th><th>نوع</th><th>توضیحات</th></tr></thead><tbody>';
          section.properties.forEach(p => {
            table += `<tr><td><code>${p.name}</code></td><td>${p.type}</td><td>${p.description}</td></tr>`;
          });
          table += '</tbody></table>';
          div.innerHTML = table;
          sectionEl.appendChild(div);
        }

        if (section.methods && section.methods.length > 0) {
          const methodTitle = document.createElement('h3');
          methodTitle.textContent = '⚙️ متدها';
          sectionEl.appendChild(methodTitle);

          const div = document.createElement('div');
          div.className = 'table-responsive';
          let table = '<table><thead><tr><th>متد</th><th>پارامترها</th><th>خروجی</th><th>توضیحات</th></tr></thead><tbody>';
          section.methods.forEach(m => {
            let paramsStr = m.params.map(p => `${p[0]}: ${p[1]}`).join(', ');
            if (!paramsStr) paramsStr = '—';
            table += `<tr>
                        <td><code>${m.name}()</code></td>
                        <td>${paramsStr}</td>
                        <td>${m.returns || 'None'}</td>
                        <td>${m.description}</td>
                      </tr>`;
          });
          table += '</tbody></table>';
          div.innerHTML = table;
          sectionEl.appendChild(div);
        }

        if (section.subsections) {
          section.subsections.forEach(sub => {
            const subTitle = document.createElement('h3');
            subTitle.textContent = sub.subtitle;
            sectionEl.appendChild(subTitle);

            if (sub.class_signature) {
              const sig = document.createElement('div');
              sig.className = 'class-signature';
              sig.style.marginRight = '0';
              sig.textContent = sub.class_signature;
              sectionEl.appendChild(sig);
            }

            if (sub.properties && sub.properties.length > 0) {
              const div = document.createElement('div');
              div.className = 'table-responsive';
              let table = '<table><thead><tr><th>پراپرتی</th><th>نوع</th><th>توضیحات</th></tr></thead><tbody>';
              sub.properties.forEach(p => {
                table += `<tr><td><code>${p.name}</code></td><td>${p.type}</td><td>${p.description}</td></tr>`;
              });
              table += '</tbody></table>';
              div.innerHTML = table;
              sectionEl.appendChild(div);
            }
          });
        }

        if (section.filter_groups) {
          section.filter_groups.forEach(group => {
            const groupTitle = document.createElement('h3');
            groupTitle.textContent = group.group;
            sectionEl.appendChild(groupTitle);

            const div = document.createElement('div');
            div.className = 'table-responsive';
            let table = '<table><thead><tr><th>فیلتر</th><th>پارامتر</th><th>توضیحات</th></tr></thead><tbody>';
            group.filters.forEach(f => {
              let params = f.params ? f.params.map(p => `${p[0]}: ${p[1]}`).join(', ') : '—';
              table += `<tr><td><code>${f.name}</code></td><td>${params}</td><td>${f.description}</td></tr>`;
            });
            table += '</tbody></table>';
            div.innerHTML = table;
            sectionEl.appendChild(div);
          });
        }

        if (section.note) {
          const noteP = document.createElement('p');
          noteP.style.background = '#fef9e7';
          noteP.style.padding = '0.8rem 1.2rem';
          noteP.style.borderRadius = '8px';
          noteP.style.borderRight = '4px solid #ffb300';
          noteP.textContent = '📌 ' + section.note;
          sectionEl.appendChild(noteP);
        }

        if (section.example) {
          const exTitle = document.createElement('p');
          exTitle.style.fontWeight = 'bold';
          exTitle.style.margin = '1.8rem 0 0.5rem';
          exTitle.textContent = '🧪 مثال';
          sectionEl.appendChild(exTitle);

          const wrapper = document.createElement('div');
          wrapper.className = 'code-block-wrapper';
          const btn = document.createElement('button');
          btn.className = 'copy-btn';
          btn.textContent = 'کپی';
          wrapper.appendChild(btn);

          const pre = document.createElement('pre');
          const code = document.createElement('code');
          code.className = 'language-python';
          code.textContent = section.example.trim();
          pre.appendChild(code);
          wrapper.appendChild(pre);
          sectionEl.appendChild(wrapper);
        }

        container.appendChild(sectionEl);

        const tocItem = document.createElement('li');
        const tocLink = document.createElement('a');
        tocLink.href = `#${section.id}`;
        tocLink.textContent = section.title.replace('🔹', '').trim();
        tocItem.appendChild(tocLink);
        tocList.appendChild(tocItem);
      });

      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', function (e) {
          const pre = this.nextElementSibling;
          const code = pre.querySelector('code');
          navigator.clipboard.writeText(code.textContent).then(() => {
            this.textContent = '✅ کپی شد!';
            setTimeout(() => { this.textContent = 'کپی'; }, 1200);
          });
        });
      });

      if (window.Prism) Prism.highlightAll();
    }

    window.addEventListener('DOMContentLoaded', renderModels);
  </script>
